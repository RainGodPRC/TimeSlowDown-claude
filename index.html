<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
  <meta name="theme-color" content="#0f1014" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f7f4ef" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TimeSlowDown">
  <meta name="description" content="让走过的时间，长成你的人生。TSD 每天把你带回一个过去的瞬间，让记忆在反复回访里变厚。">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <title>TimeSlowDown · 回访</title>
  <link rel="stylesheet" href="styles.css?v=18">
  <style>
    #boot{position:fixed;inset:0;background:#0f1014;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .35s ease}
    #boot.is-out{opacity:0;pointer-events:none}
    #boot .b-mark{font-size:56px;color:#d8c9a0}
    #boot .b-txt{color:#8a857c;font-size:13px;letter-spacing:1px}
    @media (prefers-color-scheme: light){ #boot{background:#f7f4ef} #boot .b-mark{color:#8a6f3a} #boot .b-txt{color:#6a655c} }
  </style>
</head>
<body>
  <div id="boot"><div class="b-mark">⊜</div><div class="b-txt">让走过的时间，长成你的人生</div></div>
  <div id="app" role="main"></div>
  <script src="data.js?v=18"></script>
  <script src="app.js?v=18"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
