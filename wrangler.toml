name = "tsd-llm"
main = "cloudflare/worker.js"
compatibility_date = "2026-07-01"

# 密钥不进 git：
#   npx wrangler secret put ANTHROPIC_API_KEY   # 粘贴 Claude API key
# 可选：限制只接受来自你域的请求（生产必设）
#   npx wrangler secret put ALLOWED_ORIGIN      # 如 https://raingodprc.github.io
#
# 本地开发用 .dev.vars（已在 .gitignore）：
#   ANTHROPIC_API_KEY=sk-ant-xxx
#   ALLOWED_ORIGIN=http://localhost:8799

# 部署后端点形如 https://tsd-llm.<你的-subdomain>.workers.dev/ask
# 在 TSD app 里：设置 → AI 增强 → 填入该端点（setLlmEndpoint）

[vars]
# 非密钥配置可放这里（密钥用 secret，不放 vars）
